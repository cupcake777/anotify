<svg width="960" height="360" viewBox="0 0 960 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">anotify pixel messenger bird animation</title>
  <desc id="desc">A cute pixel-style blue messenger bird delivering notifications for anotify.</desc>

  <style>
    :root {
      --ink: #17345d;
      --blue-dark: #1e56a0;
      --blue: #6eb6ef;
      --blue-light: #9ed6ff;
      --cream: #fff1c8;
      --peach: #ffd7c7;
      --orange: #f59b23;
      --brown-dark: #7b3f1d;
      --brown: #a96432;
      --paper: #fffaf0;
      --red: #ff6478;
      --yellow: #ffca55;
      --muted: #6e87a8;
      --bg1: #fffaf2;
      --bg2: #eef7ff;
    }

    .pixel { shape-rendering: crispEdges; }
    .title { font: 800 58px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: var(--ink); letter-spacing: -2px; }
    .tagline { font: 600 18px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: var(--muted); }
    .small { font: 700 15px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: var(--ink); }

    #bird {
      transform-origin: 280px 180px;
      animation: bob 2.4s ease-in-out infinite;
    }
    #wing-left { transform-origin: 194px 178px; animation: flapL .8s ease-in-out infinite; }
    #wing-right { transform-origin: 346px 178px; animation: flapR .8s ease-in-out infinite; }
    #letter { transform-origin: 398px 166px; animation: letterFloat 2.4s ease-in-out infinite; }
    #badge { transform-origin: center; animation: badgePop 2.4s ease-in-out infinite; }
    #sparkles g { transform-origin: center; animation: twinkle 1.8s ease-in-out infinite; }
    #sparkles g:nth-child(2) { animation-delay: .35s; }
    #sparkles g:nth-child(3) { animation-delay: .7s; }
    #sparkles g:nth-child(4) { animation-delay: 1.05s; }
    #trail rect { animation: trail 1.5s ease-in-out infinite; }
    #trail rect:nth-child(2) { animation-delay: .18s; }
    #trail rect:nth-child(3) { animation-delay: .36s; }
    #trail rect:nth-child(4) { animation-delay: .54s; }
    #cursor { animation: blink 1.1s steps(2, jump-none) infinite; }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    @keyframes flapL {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(-8deg) translateY(-3px); }
    }
    @keyframes flapR {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(8deg) translateY(-3px); }
    }
    @keyframes letterFloat {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      50% { transform: translate(6px, -8px) rotate(2deg); }
    }
    @keyframes badgePop {
      0%, 65%, 100% { transform: scale(1); }
      75% { transform: scale(1.18); }
      85% { transform: scale(.96); }
    }
    @keyframes twinkle {
      0%, 100% { opacity: .35; transform: scale(.8); }
      50% { opacity: 1; transform: scale(1.18); }
    }
    @keyframes trail {
      0%, 100% { opacity: .2; transform: translateX(0); }
      50% { opacity: .9; transform: translateX(-8px); }
    }
    @keyframes blink {
      0%, 45% { opacity: 1; }
      46%, 100% { opacity: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      #bird, #wing-left, #wing-right, #letter, #badge, #sparkles g, #trail rect, #cursor { animation: none; }
    }
  </style>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="var(--bg1)"/>
      <stop offset="1" stop-color="var(--bg2)"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="10" flood-color="#17345d" flood-opacity="0.13"/>
    </filter>
  </defs>

  <rect width="960" height="360" rx="32" fill="url(#bg)"/>
  <rect x="28" y="28" width="904" height="304" rx="24" fill="#ffffff" opacity="0.45" stroke="#dbe9f8" stroke-width="2"/>

  <g id="sparkles" class="pixel">
    <g><rect x="120" y="82" width="12" height="36" fill="var(--yellow)"/><rect x="108" y="94" width="36" height="12" fill="var(--yellow)"/></g>
    <g><rect x="435" y="66" width="10" height="30" fill="var(--red)"/><rect x="425" y="76" width="30" height="10" fill="var(--red)"/></g>
    <g><rect x="518" y="242" width="12" height="36" fill="var(--yellow)"/><rect x="506" y="254" width="36" height="12" fill="var(--yellow)"/></g>
    <g><rect x="814" y="86" width="10" height="30" fill="var(--yellow)"/><rect x="804" y="96" width="30" height="10" fill="var(--yellow)"/></g>
  </g>

  <g id="trail" class="pixel" opacity="0.7">
    <rect x="86" y="176" width="16" height="16" fill="#9ed6ff"/>
    <rect x="122" y="200" width="12" height="12" fill="#9ed6ff"/>
    <rect x="142" y="150" width="10" height="10" fill="#6eb6ef"/>
    <rect x="166" y="222" width="8" height="8" fill="#6eb6ef"/>
  </g>

  <ellipse cx="286" cy="283" rx="142" ry="20" fill="#17345d" opacity="0.11"/>

  <g id="bird" class="pixel" filter="url(#softShadow)">
    <!-- body outline -->
    <rect x="214" y="72" width="132" height="16" fill="var(--blue-dark)"/>
    <rect x="182" y="88" width="196" height="16" fill="var(--blue-dark)"/>
    <rect x="166" y="104" width="228" height="16" fill="var(--blue-dark)"/>
    <rect x="150" y="120" width="260" height="32" fill="var(--blue-dark)"/>
    <rect x="134" y="152" width="292" height="64" fill="var(--blue-dark)"/>
    <rect x="150" y="216" width="260" height="32" fill="var(--blue-dark)"/>
    <rect x="182" y="248" width="196" height="16" fill="var(--blue-dark)"/>

    <!-- body fill -->
    <rect x="198" y="88" width="164" height="16" fill="var(--blue)"/>
    <rect x="174" y="104" width="212" height="16" fill="var(--blue)"/>
    <rect x="158" y="120" width="244" height="32" fill="var(--blue)"/>
    <rect x="150" y="152" width="260" height="64" fill="var(--blue)"/>
    <rect x="166" y="216" width="228" height="32" fill="var(--blue)"/>
    <rect x="198" y="248" width="164" height="16" fill="var(--blue)"/>
    <rect x="188" y="104" width="72" height="16" fill="var(--blue-light)" opacity="0.65"/>
    <rect x="174" y="124" width="44" height="18" fill="var(--blue-light)" opacity="0.45"/>

    <!-- tuft -->
    <rect x="264" y="44" width="24" height="16" fill="var(--blue-dark)"/>
    <rect x="280" y="60" width="24" height="28" fill="var(--blue-dark)"/>
    <rect x="264" y="60" width="24" height="16" fill="var(--blue-light)"/>

    <!-- wings -->
    <g id="wing-left">
      <rect x="110" y="156" width="40" height="64" fill="var(--blue-dark)"/>
      <rect x="126" y="144" width="32" height="72" fill="var(--blue)"/>
      <rect x="142" y="160" width="20" height="40" fill="var(--blue-light)" opacity="0.55"/>
    </g>
    <g id="wing-right">
      <rect x="410" y="156" width="40" height="64" fill="var(--blue-dark)"/>
      <rect x="402" y="144" width="32" height="72" fill="var(--blue)"/>
      <rect x="404" y="160" width="18" height="40" fill="var(--blue-light)" opacity="0.55"/>
    </g>

    <!-- cream face/belly -->
    <rect x="202" y="134" width="52" height="32" fill="var(--cream)"/>
    <rect x="306" y="134" width="52" height="32" fill="var(--cream)"/>
    <rect x="186" y="166" width="188" height="32" fill="var(--cream)"/>
    <rect x="202" y="198" width="156" height="50" fill="var(--cream)"/>
    <rect x="254" y="150" width="52" height="22" fill="var(--cream)"/>

    <!-- face -->
    <rect x="218" y="170" width="20" height="28" fill="#0b2447"/>
    <rect x="326" y="170" width="20" height="28" fill="#0b2447"/>
    <rect x="270" y="176" width="16" height="16" fill="var(--orange)"/>
    <rect x="286" y="184" width="12" height="12" fill="#ffba34"/>
    <rect x="208" y="204" width="22" height="10" fill="var(--peach)" opacity="0.9"/>
    <rect x="334" y="204" width="22" height="10" fill="var(--peach)" opacity="0.9"/>

    <!-- feet -->
    <rect x="206" y="252" width="40" height="14" fill="#d97812"/>
    <rect x="214" y="244" width="36" height="14" fill="var(--orange)"/>
    <rect x="320" y="252" width="40" height="14" fill="#d97812"/>
    <rect x="324" y="244" width="36" height="14" fill="var(--orange)"/>

    <!-- strap -->
    <rect x="142" y="178" width="24" height="22" fill="var(--brown-dark)"/>
    <rect x="166" y="190" width="32" height="22" fill="var(--brown)"/>
    <rect x="198" y="206" width="32" height="22" fill="var(--brown)"/>
    <rect x="230" y="222" width="32" height="22" fill="var(--brown)"/>
    <rect x="262" y="238" width="32" height="20" fill="var(--brown-dark)"/>

    <!-- bag -->
    <rect x="310" y="204" width="104" height="76" fill="var(--brown-dark)"/>
    <rect x="326" y="194" width="88" height="16" fill="var(--brown)"/>
    <rect x="326" y="216" width="72" height="48" fill="var(--paper)"/>
    <rect x="334" y="224" width="56" height="8" fill="#e9d9c9"/>
    <rect x="342" y="232" width="40" height="8" fill="#e9d9c9"/>
    <rect x="352" y="240" width="20" height="14" fill="var(--red)"/>
    <rect x="344" y="236" width="12" height="12" fill="var(--red)"/>
    <rect x="372" y="236" width="12" height="12" fill="var(--red)"/>
  </g>

  <!-- floating letter -->
  <g id="letter" class="pixel">
    <rect x="438" y="118" width="112" height="74" fill="#0b2447"/>
    <rect x="446" y="126" width="96" height="58" fill="var(--paper)"/>
    <rect x="454" y="134" width="80" height="8" fill="#e9d9c9"/>
    <rect x="462" y="142" width="64" height="8" fill="#e9d9c9"/>
    <rect x="478" y="152" width="24" height="22" fill="var(--red)"/>
    <rect x="466" y="146" width="18" height="18" fill="var(--red)"/>
    <rect x="498" y="146" width="18" height="18" fill="var(--red)"/>
  </g>

  <g id="badge" class="pixel">
    <rect x="538" y="92" width="44" height="44" rx="8" fill="var(--red)"/>
    <rect x="548" y="84" width="24" height="8" fill="#ff8fa0"/>
    <text x="559" y="122" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="26" font-weight="900" fill="white">1</text>
  </g>

  <g transform="translate(612 104)">
    <text class="title" x="0" y="0">anotify</text>
    <text class="tagline" x="2" y="42">tiny notifications for agents</text>

    <g class="pixel" transform="translate(4 74)">
      <rect x="0" y="0" width="250" height="40" rx="12" fill="#fff4df" stroke="#ffd7b5" stroke-width="2"/>
      <text class="small" x="20" y="26">approval · done · failed</text>
      <rect id="cursor" x="226" y="11" width="8" height="20" fill="var(--red)"/>
    </g>

    <g class="pixel" transform="translate(4 138)">
      <rect x="0" y="0" width="56" height="56" rx="14" fill="#e9f5ff"/>
      <rect x="20" y="14" width="16" height="26" fill="var(--blue-dark)"/>
      <rect x="14" y="22" width="28" height="20" fill="var(--blue)"/>
      <rect x="22" y="42" width="12" height="6" fill="var(--blue-dark)"/>

      <rect x="76" y="0" width="56" height="56" rx="14" fill="#fff0f1"/>
      <rect x="94" y="20" width="20" height="20" fill="var(--red)"/>
      <rect x="88" y="14" width="16" height="16" fill="var(--red)"/>
      <rect x="108" y="14" width="16" height="16" fill="var(--red)"/>

      <rect x="152" y="0" width="56" height="56" rx="14" fill="#f0fff4"/>
      <rect x="170" y="14" width="24" height="32" fill="#78b159"/>
      <rect x="178" y="22" width="8" height="16" fill="#d8f3c5"/>
    </g>
  </g>
</svg>
