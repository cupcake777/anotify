<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>anotify toasts</title>
<style>
:root{
  --cream:#fffaf3; --cream-2:#fff4e5; --navy:#24446f; --navy-ink:#1a3251;
  --ink:#46566f; --muted:#8493a8; --line:color-mix(in srgb,var(--navy) 82%,white);
  --k-complete:#48b079; --k-error:#ec6a6a; --k-approval:#eba33a; --k-message:#5aa6f0; --k-info:#93a6c2;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:transparent;overflow:hidden;font-family:'Baloo 2',system-ui,-apple-system,sans-serif;color:var(--navy)}
#stack{position:fixed;right:14px;bottom:14px;display:flex;flex-direction:column-reverse;gap:12px;width:372px}
.toast{position:relative;display:grid;grid-template-columns:60px 1fr;gap:12px;padding:12px 14px;overflow:hidden;cursor:pointer;
  background:linear-gradient(168deg,var(--cream) 0%,var(--cream-2) 100%);border:2.5px solid var(--line);border-radius:16px;
  box-shadow:2px 3px 0 rgba(11,36,71,.20),0 12px 28px -18px rgba(11,36,71,.45);transform-origin:right center;animation:pop .42s cubic-bezier(.2,1.15,.32,1) both}
.toast.out{animation:bye .3s ease forwards}
.toast.crit.out{animation:bye .3s ease forwards}
.toast::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--accent,#93a6c2)}
.toast.crit{animation:pop .42s cubic-bezier(.2,1.15,.32,1) both,glow 1.7s ease-in-out infinite .6s}
.avatar{align-self:start;width:60px;height:60px;display:grid;place-items:center;border-radius:13px;
  background:radial-gradient(circle at 50% 44%,color-mix(in srgb,var(--accent) 22%,#fff) 0%,color-mix(in srgb,var(--accent) 8%,#fff) 72%,transparent 100%)}
.sprite{width:56px;height:56px;display:block;image-rendering:auto;filter:drop-shadow(0 2px 1px rgba(11,36,71,.10));animation:bob 3.6s ease-in-out infinite}
.sprite.nobob{animation-play-state:paused}
.toast.paused .sprite{animation-play-state:paused}
.body{min-width:0;align-self:center}
.title{font-size:15px;font-weight:700;line-height:1.18;color:var(--navy-ink);letter-spacing:-.01em}
.summary{margin-top:2px;font-family:'JetBrains Mono',ui-monospace,monospace;font-weight:500;font-size:11.5px;line-height:1.3;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.meta{display:flex;align-items:center;gap:7px;margin-top:8px}
.host{width:19px;height:19px;border-radius:6px;display:grid;place-items:center;flex:none;font-family:ui-monospace,monospace;font-weight:700;font-size:9.5px;color:#43577a;background:color-mix(in srgb,var(--navy) 12%,#fff);border:1.5px solid color-mix(in srgb,var(--navy) 24%,#fff)}
.agent{font-family:ui-monospace,monospace;font-size:10.5px;font-weight:600;color:#5b6b84;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px}
.time{font-family:ui-monospace,monospace;font-size:10px;color:var(--muted);margin-left:auto;flex:none}
.close{position:absolute;top:7px;right:9px;width:20px;height:20px;border:none;border-radius:7px;background:transparent;color:var(--muted);font-size:15px;line-height:1;cursor:pointer;opacity:0;transition:opacity .12s,background .12s}
.toast:hover .close,.toast.sticky .close{opacity:1}
.close:hover{background:rgba(11,36,71,.08);color:var(--navy)}
.prog{position:absolute;left:0;bottom:0;height:3.5px;width:100%;background:var(--accent);transform-origin:left}
.prog.run{animation:drain linear forwards}
.toast.paused .prog.run{animation-play-state:paused}
.details{grid-column:1/-1;max-height:0;overflow:hidden;transition:max-height .26s ease}
.toast.open .details{max-height:240px}
.details-inner{margin-top:10px;padding-top:10px;border-top:1.5px dashed color-mix(in srgb,var(--navy) 20%,#fff)}
.full{margin:0;font-family:ui-monospace,monospace;font-size:11px;line-height:1.45;color:var(--ink);white-space:pre-wrap;word-break:break-word;max-height:120px;overflow:auto}
.ctx{display:grid;grid-template-columns:auto 1fr;gap:3px 10px;margin:2px 0 10px;font-family:ui-monospace,monospace;font-size:10.5px}
.ctx dt{color:var(--muted);font-weight:600}.ctx dd{margin:0;color:var(--navy-ink);word-break:break-all}
.actionbar{grid-column:1/-1;display:flex;gap:8px;margin-top:10px}
.act{flex:1;font-weight:700;font-size:12.5px;cursor:pointer;border-radius:10px;padding:7px;border:2px solid var(--line);box-shadow:1px 2px 0 rgba(11,36,71,.14)}
.act.accept{background:var(--k-complete);color:#fff;border-color:color-mix(in srgb,var(--k-complete) 70%,#000 12%)}
.act.deny{background:#fff;color:var(--k-error);border-color:color-mix(in srgb,var(--k-error) 55%,#fff)}
.act.ack{background:var(--k-error);color:#fff;border-color:color-mix(in srgb,var(--k-error) 70%,#000 12%)}
.act.ghost{background:#fff;color:var(--navy)}
.resolved{grid-column:1/-1;margin-top:9px;font-weight:700;font-size:13px}
.hint{grid-column:1/-1;font-family:ui-monospace,monospace;font-size:9px;color:var(--muted);margin-top:7px}
@keyframes pop{0%{opacity:0;transform:translateX(40px) scale(.95)}100%{opacity:1;transform:translateX(0) scale(1)}}
@keyframes bye{to{opacity:0;transform:translateX(54px) scale(.92);margin-bottom:-78px}}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-2.5px)}}
@keyframes drain{from{transform:scaleX(1)}to{transform:scaleX(0)}}
@keyframes glow{0%,100%{box-shadow:2px 3px 0 rgba(11,36,71,.2),0 0 0 0 rgba(236,106,106,0)}50%{box-shadow:2px 3px 0 rgba(11,36,71,.2),0 0 0 4px rgba(236,106,106,.26)}}
@media (prefers-reduced-motion:reduce){.toast,.toast.crit{animation:none}.sprite{animation:none}.prog.run{animation:none}}
</style>
</head>
<body>
<div id="stack"></div>
<script>
/* ===== anotify toast overlay — renders custom toasts from WS events =====
   Frames are sliced at runtime from the bundled transparent strips
   (assets/sprites/bird_<kind>_8f.png), so the bundle stays small and crisp. */
const KINDS=['info','message','approval','complete','error','dnd'];
const FRAMES={};
function loadImg(src){return new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=src;});}
async function loadFrames(){
  for(const k of KINDS){
    try{
      const img=await loadImg(`assets/sprites/bird_${k}_8f.png`);
      const fw=img.width/8;            // strips are 8 frames; unique poses at 0,1,2
      FRAMES[k]=[0,1,2].map(i=>{
        const c=document.createElement('canvas');c.width=fw;c.height=img.height;
        c.getContext('2d').drawImage(img,i*fw,0,fw,img.height,0,0,fw,img.height);
        return c.toDataURL('image/png');
      });
    }catch(e){FRAMES[k]=[];}
  }
}

const RULES=[[["error","fail","failed","crash","exception","traceback"],"error"],
  [["approval","approve","permission","confirm","authorize","review"],"approval"],
  [["complete","completed","done","success","succeeded","finished","passed"],"complete"],
  [["message","msg","reply","new "],"message"]];
function classify(t="",m="",s="",p="medium"){const x=(s+" "+t+" "+m).toLowerCase();
  for(const [kw,k] of RULES){if(kw.some(w=>x.includes(w)))return k;} return p==="critical"?"error":"info";}
const ACCENT={complete:"var(--k-complete)",error:"var(--k-error)",approval:"var(--k-approval)",message:"var(--k-message)",info:"var(--k-info)"};
const DURATION={low:5000,medium:5000,high:8000,critical:0};
const PACE={info:1100,message:480,approval:560,complete:560,error:440,dnd:1500};
const HOSTMAP={hpc:"H",vps:"V",local:"M",localhost:"M",mac:"M",ci:"C",github:"G"};
const stack=document.getElementById('stack');
let motion='soft', soundOn=true, volume=0.40;
const sprites=new Set();

class Sprite{
  constructor(img,kind){this.img=img;this.kind=kind;this.frames=FRAMES[kind]&&FRAMES[kind].length?FRAMES[kind]:FRAMES.info;
    this.paused=false;this.t=null;this.idleT=null;this.dead=false;
    this.ONCE=[...this.frames.keys()];this.LOOP=this.ONCE.concat(this.ONCE.slice(1,-1).reverse());
    if(this.frames[0])this.img.src=this.frames[0];sprites.add(this);}
  _bob(on){this.img.classList.toggle('nobob',!on);}
  _seq(seq,loop,done){clearTimeout(this.t);this._bob(false);const step=(PACE[this.kind]||600)/seq.length;let i=0;
    const tick=()=>{if(this.dead)return;if(this.paused){this.t=setTimeout(tick,step);return;}
      this.img.src=this.frames[seq[i]];i++;
      if(i<seq.length)this.t=setTimeout(tick,step);
      else if(loop){i=0;this.t=setTimeout(tick,step);}
      else{this.img.src=this.frames[0];if(done&&!this.dead)done();}};tick();}
  enter(){if(motion==='off'){this.img.src=this.frames[0];this._bob(false);return;}this._seq(this.ONCE,false,()=>this.settle());}
  settle(){clearTimeout(this.idleT);if(this.dead)return;
    if(motion==='lively')this._seq(this.LOOP,true);
    else if(motion==='soft'){this._bob(true);this._idle();}
    else{this.img.src=this.frames[0];this._bob(false);}}
  _idle(){clearTimeout(this.idleT);this.idleT=setTimeout(()=>{if(this.dead)return;
    if(this.paused){this._idle();return;}this._seq(this.ONCE,false,()=>{this._bob(true);this._idle();});},4000+Math.random()*3500);}
  pause(p){this.paused=p;}
  stop(){this.dead=true;clearTimeout(this.t);clearTimeout(this.idleT);sprites.delete(this);}
}

class SoundEngine{
  constructor(){this.ctx=null;this.last={};this.pending=[];this.flushT=null;this.crit=new Map();}
  _ac(){if(!this.ctx)this.ctx=new (window.AudioContext||window.webkitAudioContext)();if(this.ctx.state==='suspended')this.ctx.resume();return this.ctx;}
  _tone(f,start,dur,type,vol){const ac=this._ac();const o=ac.createOscillator(),g=ac.createGain();
    o.type=type||'sine';o.frequency.value=f;o.connect(g);g.connect(ac.destination);
    const t=ac.currentTime+start,v=Math.max(.0001,vol*volume);
    g.gain.setValueAtTime(.0001,t);g.gain.linearRampToValueAtTime(v,t+.012);g.gain.exponentialRampToValueAtTime(.0001,t+dur);
    o.start(t);o.stop(t+dur+.03);}
  voice(k){switch(k){
    case 'info':this._tone(660,0,.06,'sine',.09);break;
    case 'message':this._tone(1047,0,.07,'sine',.22);this._tone(1568,.085,.12,'sine',.20);break;
    case 'approval':this._tone(587,0,.10,'triangle',.24);this._tone(587,.17,.13,'triangle',.24);break;
    case 'complete':this._tone(523,0,.12,'sine',.18);this._tone(659,.10,.12,'sine',.19);this._tone(880,.21,.20,'sine',.22);break;
    case 'error':this._tone(330,0,.14,'triangle',.30);this._tone(247,.10,.18,'triangle',.24);break;
    case 'critical':[784,988].forEach((x,i)=>this._tone(x,i*.13,.16,'square',.20));this._tone(784,.30,.18,'square',.18);break;
    case 'accept':this._tone(660,0,.07,'sine',.15);this._tone(990,.075,.12,'sine',.15);break;
    case 'deny':this._tone(520,0,.07,'sine',.14);this._tone(390,.075,.12,'sine',.14);break;
    case 'ack':this._tone(440,0,.10,'sine',.13);break;
    default:this._tone(880,0,.07,'sine',.18);this._tone(1175,.075,.10,'sine',.16);}}
  play(kind,priority){if(priority!=='critical'){if(!soundOn)return;if(Date.now()-(this.last[kind]||0)<10000)return;}
    this.pending.push({kind,priority});clearTimeout(this.flushT);this.flushT=setTimeout(()=>this._flush(),150);}
  _flush(){const p=this.pending;this.pending=[];if(p.some(x=>x.priority==='critical'))this.voice('critical');
    const o=p.filter(x=>x.priority!=='critical');
    if(o.length===1){this.last[o[0].kind]=Date.now();this.voice(o[0].kind);}
    else if(o.length>1){o.forEach(x=>this.last[x.kind]=Date.now());this.voice('summary');}}
  startCrit(id){if(this.crit.has(id))return;this.crit.set(id,setInterval(()=>this.voice('critical'),60000));}
  stopCrit(id){const t=this.crit.get(id);if(t){clearInterval(t);this.crit.delete(id);}}
}
const sound=new SoundEngine();

function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function hhmm(ts){const d=new Date(ts||Date.now());return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function bn(p){return (p||"").replace(/\/+$/,'').split('/').pop();}
function parseSource(n){let a=n.agent,h=n.host,src=n.source||"agent";
  if(src.includes('@')){const [x,y]=src.split('@');a=a||x;h=h||y;}a=a||src;h=h||"";
  const key=(h.split(/[-.]/)[0]||"").toLowerCase();return {agent:a,host:h,initial:HOSTMAP[key]||(h?h[0].toUpperCase():"·")};}
function oneLiner(n){return n.summary||(n.script?`${n.script} · ${bn(n.cwd)}`:(n.message||"").split("\n")[0]);}

const win = window.__TAURI__ && window.__TAURI__.window ? window.__TAURI__.window.getCurrentWindow() : null;
async function showWin(){ if(win){try{await win.show();}catch(e){}} }
async function maybeHide(){ if(win && stack.children.length===0){try{await win.hide();}catch(e){}} }

function spawnToast(n){
  const kind=n.kind||classify(n.title,n.message,n.source,n.priority);
  const sticky=(n.priority==="critical"||kind==="approval");
  const dur=sticky?0:(DURATION[n.priority]??5000);
  const {agent,host,initial}=parseSource(n);
  const summary=oneLiner(n), full=n.fullText||n.message||"", hasMore=full&&full.trim()!==summary.trim();
  const id=n.id||('t'+Date.now().toString(36)+Math.random().toString(36).slice(2,5));

  const el=document.createElement('div');
  el.className='toast'+(n.priority==="critical"?' crit':'')+(sticky?' sticky':'')+(kind==="approval"?' open':'');
  el.style.setProperty('--accent',ACCENT[kind]||ACCENT.info); el._cid=id;

  let details="",actionbar="";
  if(kind==="approval"){
    details=`<div class="details"><div class="details-inner"><dl class="ctx">
      <dt>agent</dt><dd>${esc(agent)}</dd><dt>host</dt><dd>${esc(host||'—')}</dd>
      ${n.cwd?`<dt>cwd</dt><dd>${esc(n.cwd)}</dd>`:''}${n.target?`<dt>target</dt><dd>${esc(n.target)}</dd>`:''}
      ${n.action?`<dt>action</dt><dd>${esc(n.action)}</dd>`:''}</dl></div></div>`;
    actionbar=`<div class="actionbar"><button class="act accept" data-act="accept">Accept</button><button class="act deny" data-act="deny">Deny</button></div>`;
  }else if(n.priority==="critical"){
    if(hasMore)details=`<div class="details"><div class="details-inner"><pre class="full">${esc(full)}</pre></div></div>`;
    actionbar=`<div class="actionbar"><button class="act ack" data-act="ack">Acknowledge</button></div>`;
  }else if(hasMore){
    details=`<div class="details"><div class="details-inner"><pre class="full">${esc(full)}</pre></div></div>`;
  }

  el.innerHTML=`<div class="avatar"><img class="sprite" alt=""></div>
    <div class="body"><div class="title">${esc(n.title||'Agent notification')}</div>
      <div class="summary">${esc(summary)}</div>
      <div class="meta"><span class="host" title="${esc(host||'unknown host')}">${esc(initial)}</span>
        <span class="agent">${esc(agent)}</span><span class="time">${hhmm(n.timestamp?n.timestamp*1000:Date.now())}</span></div>
    </div>${details}${actionbar}
    <button class="close" title="Dismiss">×</button>
    ${dur>0?`<div class="prog run" style="animation-duration:${dur}ms"></div>`:``}
    ${(hasMore&&kind!=="approval"&&n.priority!=="critical")?`<div class="hint">tap to expand ⌄</div>`:``}`;

  stack.appendChild(el); showWin();
  while(stack.children.length>5) hardRemove(stack.firstElementChild);

  const sp=new Sprite(el.querySelector('.sprite'),kind); sp.enter(); el._sprite=sp;
  if(soundOn||n.priority==='critical') sound.play(kind,n.priority);
  if(n.priority==='critical') sound.startCrit(id);

  let timer=dur>0?setTimeout(()=>dismiss(el),dur):null;
  el.addEventListener('mouseenter',()=>{el.classList.add('paused');sp.pause(true);if(timer){clearTimeout(timer);timer=null;}});
  el.addEventListener('mouseleave',()=>{el.classList.remove('paused');sp.pause(false);if(dur>0&&!timer)timer=setTimeout(()=>dismiss(el),remaining(el));});
  el.addEventListener('click',(e)=>{if(e.target.closest('.act')||e.target.closest('.close'))return;if(kind==="approval")return;if(hasMore)el.classList.toggle('open');});
  el.querySelector('.close').addEventListener('click',()=>{if(timer)clearTimeout(timer);dismiss(el);});
  el.querySelectorAll('.act').forEach(b=>b.addEventListener('click',()=>{
    const a=b.dataset.act; if(soundOn)sound.voice(a);
    const bar=el.querySelector('.actionbar'); const label=a==='accept'?'Approved':a==='deny'?'Denied':'Acknowledged';
    if(bar)bar.outerHTML=`<div class="resolved" style="color:${a==='deny'?'var(--k-error)':a==='accept'?'var(--k-complete)':'var(--muted)'}">${a==='deny'?'✕':'✔'} ${label}</div>`;
    setTimeout(()=>dismiss(el),850);
  }));
}
function remaining(el){const b=el.querySelector('.prog');if(!b)return 0;const w=b.getBoundingClientRect().width/el.getBoundingClientRect().width;return Math.max(400,w*(parseFloat(b.style.animationDuration)||5000));}
function dismiss(el){if(!el||el.classList.contains('out'))return;el.classList.add('out');
  el.addEventListener('animationend',()=>hardRemove(el),{once:true});setTimeout(()=>hardRemove(el),420);}
function hardRemove(el){if(!el||el._gone)return;el._gone=true;if(el._sprite)el._sprite.stop();if(el._cid)sound.stopCrit(el._cid);el.remove();maybeHide();}

/* ===== position window bottom-right + wire WS notification events ===== */
async function place(){
  if(!win) return;
  try{
    const { currentMonitor, LogicalSize, LogicalPosition } = window.__TAURI__.window;
    const mon = await currentMonitor();
    const W=400,H=660,m=10;
    await win.setSize(new LogicalSize(W,H));
    if(mon){const s=mon.scaleFactor; const sw=mon.size.width/s, sh=mon.size.height/s;
      await win.setPosition(new LogicalPosition(Math.round(sw-W-m), Math.round(sh-H-m)));}
  }catch(e){}
}
async function boot(){
  await loadFrames();
  await place();
  if(window.__TAURI__ && window.__TAURI__.event){
    // Rust forwards the full notification JSON on "notification"
    window.__TAURI__.event.listen('notification', ev=>{ try{ spawnToast(ev.payload||{}); }catch(e){console.error(e);} });
    // optional: live settings pushed from the dashboard
    window.__TAURI__.event.listen('toast-settings', ev=>{ const s=ev.payload||{};
      if(s.motion)motion=s.motion; if(typeof s.soundOn==='boolean')soundOn=s.soundOn; if(typeof s.volume==='number')volume=s.volume; });
  }
  if(win){ try{ await win.hide(); }catch(e){} }   // start hidden; show on first toast
}
boot();
</script>
</body>
</html>
