<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>anotify toasts</title>
<style>
@font-face{font-family:'anotify Nerd Font';src:url('assets/fonts/jbm-nerd-regular.woff2') format('woff2');font-style:normal;font-weight:400;font-display:swap}
@font-face{font-family:'anotify Nerd Font';src:url('assets/fonts/jbm-nerd-bold.woff2') format('woff2');font-style:normal;font-weight:700;font-display:swap}
:root{
  --cream:#fffaf3; --cream-2:#fff4e5; --navy:#24446f; --navy-ink:#1a3251;
  --ink:#46566f; --muted:#8493a8; --line:color-mix(in srgb,var(--navy) 82%,white);
  --k-complete:#48b079; --k-error:#ec6a6a; --k-approval:#eba33a; --k-message:#5aa6f0; --k-info:#93a6c2;
  --text-on-accent:#102640; --t-complete:#176b45; --t-error:#9f2727; --t-approval:#7b4b00;
  --font-nerd:'anotify Nerd Font','JetBrainsMono Nerd Font','JetBrainsMono NF',ui-monospace,monospace;
  --font-ui:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:transparent;overflow:hidden;font-family:var(--font-ui);color:var(--navy);font-size:13px;line-height:1.45}
#stack{position:fixed;right:12px;bottom:12px;display:flex;flex-direction:column-reverse;gap:10px;width:386px;max-width:calc(100vw - 24px)}
.toast{position:relative;display:grid;grid-template-columns:44px 1fr;gap:10px;padding:12px 14px;overflow:hidden;cursor:pointer;
  background:linear-gradient(168deg,var(--cream) 0%,var(--cream-2) 100%);border:1px solid rgba(209,196,176,.88);border-radius:14px;
  box-shadow:2px 3px 0 rgba(11,36,71,.14),0 12px 28px -18px rgba(11,36,71,.34),inset 0 1px 0 rgba(255,255,255,.76)}
.toast::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--accent,#93a6c2)}
.avatar{align-self:start;position:relative;width:44px;height:44px;border-radius:10px;
  background:radial-gradient(circle at 50% 38%,#fff 0%,color-mix(in srgb,var(--accent) 10%,#fff) 78%,color-mix(in srgb,var(--accent) 18%,#fff) 100%);border:1px solid color-mix(in srgb,var(--accent) 32%,#fff);box-shadow:inset 0 1px 0 #fff,1px 2px 0 rgba(11,36,71,.10);overflow:hidden}
.sprite{position:absolute;left:50%;top:50%;width:52px;height:52px;display:block;background-repeat:no-repeat;image-rendering:auto;transform:translate(-50%,-50%);filter:drop-shadow(0 1px 1px rgba(11,36,71,.10))}
.body{min-width:0;align-self:center;padding-right:18px}
.titleline{display:flex;align-items:center;gap:7px;min-width:0}
.title,.event-tag,.source-mark,.agent,.host,.time,.ctx,.act,.resolved,.hint{font-family:var(--font-nerd)}
.title{min-width:0;font-size:15px;font-weight:700;line-height:1.22;color:var(--navy-ink);letter-spacing:-.01em;overflow-wrap:anywhere}
.event-tag{flex:none;padding:2px 6px;border-radius:999px;background:color-mix(in srgb,var(--accent) 13%,#fff);border:1px solid color-mix(in srgb,var(--accent) 28%,#fff);font-size:8.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:color-mix(in srgb,var(--accent) 60%,var(--navy-ink))}
.summary{margin-top:4px;font-family:var(--font-ui);font-weight:500;font-size:11.5px;line-height:1.38;color:var(--ink);white-space:normal;overflow:visible;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
.meta{display:flex;align-items:center;gap:6px;margin-top:8px;min-width:0}
.source-mark{width:19px;height:19px;border-radius:6px;display:grid;place-items:center;flex:none;font-weight:700;font-size:9.5px;color:#43577a;background:color-mix(in srgb,var(--navy) 12%,#fff);border:1.5px solid color-mix(in srgb,var(--navy) 24%,#fff)}
.agent{font-size:10.5px;font-weight:700;color:#455a78;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:112px}
.host{max-width:105px;padding:1px 6px;border-radius:999px;background:rgba(36,68,111,.07);font-size:9px;color:#66758b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.time{font-size:10px;color:var(--muted);margin-left:auto;flex:none}
.expand{flex:none;color:var(--muted);font-size:12px;line-height:1}.toast.open .expand{transform:rotate(180deg)}
.close{position:absolute;top:7px;right:9px;width:20px;height:20px;border:none;border-radius:7px;background:transparent;color:var(--muted);font-size:15px;line-height:1;cursor:pointer;opacity:0}
.toast:hover .close,.toast.sticky .close{opacity:1}
.close:hover{background:rgba(11,36,71,.08);color:var(--navy)}
.details{grid-column:1/-1;max-height:0;overflow:hidden}
.toast.open .details{max-height:390px}
.details-inner{margin-top:10px;padding-top:10px;border-top:1.5px dashed color-mix(in srgb,var(--navy) 20%,#fff)}
.full{margin:0 0 10px;padding:8px 9px;border-radius:8px;background:rgba(255,255,255,.55);font-family:var(--font-ui);font-size:11px;line-height:1.45;color:var(--ink);white-space:pre-wrap;word-break:break-word;max-height:150px;overflow:auto;scrollbar-width:thin;scrollbar-color:color-mix(in srgb,var(--accent) 48%,#fff) transparent}.full::-webkit-scrollbar{width:8px}.full::-webkit-scrollbar-thumb{background:color-mix(in srgb,var(--accent) 38%,#fff);border-radius:999px;border:2px solid transparent;background-clip:content-box}.full::-webkit-scrollbar-track{background:transparent}
.ctx{display:grid;grid-template-columns:76px minmax(0,1fr);gap:4px 10px;margin:0;font-size:10px}
.ctx dt{color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em}.ctx dd{margin:0;color:var(--navy-ink);word-break:break-word}
.actionbar{grid-column:1/-1;display:none;gap:8px;margin-top:10px}
.toast.open .actionbar{display:flex}
.act{flex:1;font-weight:800;font-size:12.5px;cursor:pointer;border-radius:9px;padding:7px;border:1px solid var(--line);box-shadow:1px 2px 0 rgba(11,36,71,.12)}
.act.accept{background:var(--k-complete);color:var(--text-on-accent);border-color:color-mix(in srgb,var(--k-complete) 70%,#000 12%)}
.act.deny{background:#fff;color:var(--k-error);border-color:color-mix(in srgb,var(--k-error) 55%,#fff)}

.act.ghost{background:#fff;color:var(--navy)}
.resolved{grid-column:1/-1;margin-top:9px;font-weight:700;font-size:13px}
.hint{grid-column:1/-1;font-size:9px;color:var(--muted);margin-top:7px}

</style>
</head>

  stack.appendChild(el);el._sprite=new Sprite(el.querySelector('.sprite'),type);showWin();if(n.approval_id){el._approvalId=n.approval_id;approvalToasts.set(n.approval_id,el)}tone(type);
  let timer=dur?setTimeout(()=>dismiss(el),dur):null;
  el.addEventListener('mouseenter',()=>{if(timer){clearTimeout(timer);timer=null}});
  el.addEventListener('mouseleave',()=>{if(dur&&!timer)timer=setTimeout(()=>dismiss(el),dur)});
  el.addEventListener('click',e=>{if(e.target.closest('.act')||e.target.closest('.close'))return;const opening=!el.classList.contains('open');if(opening)[...stack.children].forEach(other=>{if(other!==el)other.classList.remove('open')});el.classList.toggle('open')});
  el.querySelector('.close').addEventListener('click',()=>{if(timer)clearTimeout(timer);dismiss(el)});
  el.querySelectorAll('.act').forEach(button=>button.addEventListener('click',async()=>{const choice=button.dataset.act;if(n.approval_id&&window.__TAURI__?.core?.invoke){el.querySelectorAll('.act').forEach(x=>x.disabled=true);try{await window.__TAURI__.core.invoke('respond_approval',{approvalId:n.approval_id,choice,callbackUrl:n.callback_url||null})}catch(e){el.querySelectorAll('.act').forEach(x=>x.disabled=false);let err=el.querySelector('.approval-error');if(!err){err=document.createElement('div');err.className='approval-error';el.querySelector('.actionbar')?.appendChild(err)}err.textContent=`Not submitted: ${String(e)}`;return}if(!el._approvalResolved)showApprovalSubmitted(el);return}resolveLocal(el,choice)}));
}
function resolveLocal(el,choice){const bar=el.querySelector('.actionbar'),denied=choice==='deny';if(bar)bar.outerHTML=`<div class="resolved" style="color:${denied?'var(--t-error)':'var(--t-complete)'}">${denied?'✕ Denied':'✔ Approved'}</div>`;setTimeout(()=>dismiss(el),850)}
function dismiss(el){hardRemove(el)}
function hardRemove(el){if(!el||el._gone)return;el._gone=true;if(el._sprite)el._sprite.stop();if(el._approvalId)approvalToasts.delete(el._approvalId);el.remove();drainQueue();maybeHide()}
function showApprovalSubmitted(el){if(!el||el._gone||el._approvalResolved)return;const bar=el.querySelector('.actionbar');if(bar)bar.outerHTML='<div class="resolved" style="color:var(--t-approval)">⌛ Waiting for agent confirmation</div>'}
function showApprovalResolved(id,choice){const el=approvalToasts.get(id);if(!el||el._gone)return;el._approvalResolved=true;resolveLocal(el,choice)}
async function place(){if(!win)return;const W=420,H=620,m=10,TASKBAR=48;try{const {currentMonitor,LogicalSize,LogicalPosition}=window.__TAURI__.window,mon=await currentMonitor();if(mon){const s=mon.scaleFactor,sw=mon.size.width/s,sh=mon.size.height/s;await win.setSize(new LogicalSize(W,H));await win.setPosition(new LogicalPosition(Math.round(sw-W-m),Math.round(sh-H-m-TASKBAR)))}}catch(e){}}
async function boot(){await place();if(window.__TAURI__?.event){window.__TAURI__.event.listen('notification',ev=>{try{spawnToast(ev.payload||{})}catch(e){console.error(e)}});window.__TAURI__.event.listen('approval-submitted',ev=>{const p=ev.payload||{};showApprovalSubmitted(approvalToasts.get(p.approval_id))});window.__TAURI__.event.listen('approval-resolved',ev=>{const p=ev.payload||{};showApprovalResolved(p.approval_id,p.choice)});window.__TAURI__.event.listen('toast-settings',ev=>{const s=ev.payload||{};if(typeof s.soundOn==='boolean')soundOn=s.soundOn;if(typeof s.volume==='number')volume=s.volume;if(typeof s.dnd==='boolean')dndState=s.dnd})}if(win)try{await win.hide()}catch(e){}}
boot();
</script>
