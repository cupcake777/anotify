name: Build Desktop

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile
        working-directory: desktop
      - name: Build Windows MSI
        run: pnpm tauri build --bundles msi
        working-directory: desktop
      - name: Build Windows NSIS installer
        shell: pwsh
        working-directory: desktop
        run: |
          for ($i = 1; $i -le 3; $i++) {
            pnpm tauri build --bundles nsis
            if ($LASTEXITCODE -eq 0) { exit 0 }
            Write-Host "NSIS build attempt $i failed; retrying after backoff"
            Start-Sleep -Seconds (15 * $i)
          }
          Write-Host "NSIS installer build failed after retries; MSI artifact is still available."
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: anotify-windows
          path: |
            desktop/src-tauri/target/release/bundle/**/*.msi
            desktop/src-tauri/target/release/bundle/**/*.exe
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            desktop/src-tauri/target/release/bundle/**/*.msi
            desktop/src-tauri/target/release/bundle/**/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile
        working-directory: desktop
      - run: pnpm tauri build
        working-directory: desktop
      - name: Package macOS app
        run: |
          cd desktop/src-tauri/target/release/bundle
          if [ -d dmg ] && ls dmg/*.dmg 1>/dev/null 2>&1; then
            echo "DMG found"
          elif [ -d macos/anotify.app ]; then
            zip -r anotify-macos.zip macos/anotify.app
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: anotify-macos
          path: |
            desktop/src-tauri/target/release/bundle/**/*.dmg
            desktop/src-tauri/target/release/bundle/**/*.zip
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            desktop/src-tauri/target/release/bundle/**/*.dmg
            desktop/src-tauri/target/release/bundle/**/*.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - run: pnpm install --frozen-lockfile
        working-directory: desktop
      - name: Build Linux DEB/RPM
        run: pnpm tauri build --bundles deb,rpm
        working-directory: desktop
      - name: Build Linux AppImage
        working-directory: desktop
        run: |
          for i in 1 2 3; do
            pnpm tauri build --bundles appimage && exit 0
            echo "AppImage build attempt $i failed; retrying after backoff"
            sleep $((15 * i))
          done
          echo "AppImage build failed after retries; DEB/RPM artifacts are still available."
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: anotify-linux
          path: |
            desktop/src-tauri/target/release/bundle/**/*.deb
            desktop/src-tauri/target/release/bundle/**/*.rpm
            desktop/src-tauri/target/release/bundle/**/*.AppImage
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            desktop/src-tauri/target/release/bundle/**/*.deb
            desktop/src-tauri/target/release/bundle/**/*.rpm
            desktop/src-tauri/target/release/bundle/**/*.AppImage
